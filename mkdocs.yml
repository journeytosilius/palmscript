site_name: PalmScript
site_description: Deterministic DSL, bytecode VM, CLI, and editor tooling for financial time-series strategies
site_url: !ENV [DOCS_SITE_URL, "https://journeytosilius.github.io/palmscript/"]
repo_name: journeytosilius/palmscript
repo_url: https://github.com/journeytosilius/palmscript
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue grey
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue grey
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.highlight:
      anchor_linenums: true

plugins:
  - search

nav:
  - Home: index.md
  - Learn:
      - Overview: learn/overview.md
      - Installation: learn/installation.md
      - Quickstart: learn/quickstart.md
      - First Strategy: learn/first-strategy.md
      - Language Overview: learn/language-overview.md
      - Cookbook:
          - CSV Strategies: learn/cookbook/csv-strategies.md
          - Multi-Interval Strategy: learn/cookbook/multi-interval.md
          - Exchange-Backed Sources: learn/cookbook/exchange-backed-sources.md
          - Cross-Source Spread: learn/cookbook/cross-source-spread.md
  - Reference:
      - Overview: reference/overview.md
      - Lexical Structure: reference/lexical-structure.md
      - Grammar: reference/grammar.md
      - Declarations and Scope: reference/declarations-and-scope.md
      - Types and Values: reference/types-and-values.md
      - Series and Indexing: reference/series-and-indexing.md
      - Evaluation Semantics: reference/evaluation-semantics.md
      - Intervals and Sources: reference/intervals-and-sources.md
      - Builtins: reference/builtins.md
      - Outputs: reference/outputs.md
      - Diagnostics: reference/diagnostics.md
      - Interval Table: reference/intervals.md
      - CLI Command Reference: reference/cli.md
      - Glossary: reference/glossary.md
  - Tooling:
      - CLI: tooling/cli.md
      - CSV Mode: tooling/csv-mode.md
      - Market Mode: tooling/market-mode.md
      - Language Server: tooling/language-server.md
      - VS Code Extension: tooling/vscode.md
  - Internals:
      - Architecture: internals/architecture.md
      - Compiler Pipeline: internals/compiler-pipeline.md
      - Bytecode Model: internals/bytecode.md
      - VM Semantics: internals/vm.md
      - Bounded History and Memory: internals/history-memory.md
      - Rust Examples: internals/rust-examples.md
  - Contributing:
      - Testing Expectations: contributing/testing.md
      - Release Workflows: contributing/releases.md
      - Documentation Maintenance: contributing/documentation.md
